spring.application.name=teamspace
spring.config.import=optional:file:../.env[.properties],optional:file:./.env[.properties]
server.port=8080
# MySQL local config. Override these values with environment variables in production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/teamspace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Development fallback only. Use JWT_SECRET in production.
app.jwt.secret=${JWT_SECRET:teamspace-dev-jwt-secret-key-change-me-please-at-least-64-chars-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}

app.upload-dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
