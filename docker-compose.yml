services:
  mysql:
    image: mysql:8.4
    container_name: teamspace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: teamspace
    ports:
      - "3306:3306"
    volumes:
      - teamspace_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./teamspace
    container_name: teamspace-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/teamspace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      JWT_SECRET: teamspace-docker-jwt-secret-key-change-me-please-at-least-64-chars-2026
      JWT_EXPIRATION_MS: 86400000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - teamspace_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: teamspace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  teamspace_mysql_data:
  teamspace_uploads:
